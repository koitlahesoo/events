<!DOCTYPE html>
<html lang="et">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Koit Lahesoo sündmuste pesa</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
  <div class="site-wrapper">

    <header class="site-header">
      <div>
        <h1 class="site-title">Koit Lahesoo sündmuste pesa</h1>
        <p class="site-subtitle" id="site-subtitle">Laeb...</p>
      </div>
      <div class="header-stats">
        <div class="stat-block">
          <div class="stat-num" id="stat-events">—</div>
          <div class="stat-label">sündmust</div>
        </div>
        <div class="stat-block">
          <div class="stat-num" id="stat-artists">—</div>
          <div class="stat-label">esinejat</div>
        </div>
      </div>
    </header>

    <div class="filter-bar">
      <input id="search" type="text" placeholder="Otsi sündmusi, kohti või esinejaid...">
      <label class="filter-aasta">
        Aasta:
        <div class="aasta-vahemik">
          <select id="filterYearStart"></select>
          <span class="aasta-kriips">–</span>
          <select id="filterYearEnd"></select>
        </div>
      </label>
    </div>

    <div class="table-wrap">
      <table id="events-table">
        <colgroup>
          <col style="width:115px">
          <col>
          <col style="width:155px">
          <col style="width:270px">
          <col style="width:54px">
        </colgroup>
        <thead>
          <tr>
            <th data-sort="date">Kuupäev</th>
            <th data-sort="event">Sündmus</th>
            <th data-sort="place">Koht</th>
            <th data-sort="artist">Esinejad</th>
            <th>Pildid</th>
          </tr>
        </thead>
        <tbody id="events-body"></tbody>
      </table>
    </div>

  </div><!-- /.site-wrapper -->

    <script src="script.js"></script>
  </body>
</html>

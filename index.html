<!DOCTYPE html>
<html lang="et">
  <head>
    <meta charset="UTF-8">
    <title>Minu sündmuste leht</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <h1>Koit Lahesoo sündmuste pesa</h1>

    <!-- Otsing -->
    <input
      id="search"
      type="text"
      placeholder="Otsi sündmusi, kohti või esinejaid..."
    />

    <!-- Kuupäeva filtrid -->
    <div class="filters">
      <label>
        Alguskuupäev:
        <input type="date" id="filterStart">
      </label>

      <label>
        Lõppkuupäev:
        <input type="date" id="filterEnd">
      </label>
    </div>

    <!-- Sündmuste tulemused -->
    <div id="results"></div>

    <!-- JavaScript -->
    <script src="script.js"></script>
  </body>
</html>

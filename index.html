<!DOCTYPE html>
<html lang="et">
  <head>
    <meta charset="UTF-8">
    <title>Minu sündmuste leht</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <h1>Koit Lahesoo sündmuste pesa</h1>

    <!-- Otsing -->
    <input
      id="search"
      type="text"
      placeholder="Otsi sündmusi, kohti või esinejaid..."
    />

    <!-- Kuupäeva filtrid -->
    <div class="filters">
      <label>
        Alguskuupäev:
        <input type="date" id="filterStart">
      </label>

      <label>
        Lõppkuupäev:
        <input type="date" id="filterEnd">
      </label>
    </div>

    <!-- Sündmuste tulemused -->
    <table id="events-table">
      <thead>
        <tr>
          <th data-sort="date">Kuupäev</th>
          <th data-sort="event">Sündmus</th>
          <th data-sort="place">Koht</th>
          <th data-sort="artist">Artist</th>
          <th>Pildid</th>
        </tr>
      </thead>
      <tbody id="events-body"></tbody>
    </table>

    <!-- JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
